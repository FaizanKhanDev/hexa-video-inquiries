<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Form</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin: 20px 0;
            border: 1px solid #ccc;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        th {
            background: #717171;
            color: white;
            padding: 12px;
            text-align: center;
            height: 50px;
            font-weight: bold;
        }

        tr:nth-child(odd) {
            background: #efefef;
        }

        div {
            text-align: center;
        }

        img {
            display: inline-block;
        }

        .section-title {
            margin-top: 30px;
            font-size: 1.5em;
            text-align: center;
            page-break-before: always;

        }

        .section-heading {
            margin-top: 30px;
            font-size: 2em;
            text-align: center;
            position: relative;


        }
        .section-heading::after{
            position: absolute;
            content: "";
            width: 100%;
            height: 2px;
            background-color: #000;
            left: 0;
            right: 0;
            margin: 0 auto;
            bottom: -5px;

        }

        .section-title:first-of-type {
            page-break-before: auto;
        }
    </style>
</head>

<body>
    <div>
        <img src="https://i.imgur.com/uTNuU60.png" alt="Logo">
    </div>
    <h1 class="section-heading">Headings</h1>
    <hr>
</body>

</html>
